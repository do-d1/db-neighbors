name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Create firebase_options.dart
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'FBEOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return android;
            }
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'placeholder-api-key',
              appId: '1:123456789:android:abcdef123456',
              messagingSenderId: '123456789',
              projectId: 'db-neighbors-dev',
              storageBucket: 'db-neighbors-dev.appspot.com',
            );
          }
          FBEOF

      - name: Create google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "123456789",
              "project_id": "db-neighbors-dev",
              "storage_bucket": "db-neighbors-dev.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:123456789:android:abcdef123456",
                "android_client_info": { "package_name": "com.example.db_neighbors" }
              },
              "api_key": [{"current_key": "placeholder"}],
              "services": {}
            }]
          }
          GSEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Fix code issues
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK debug
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
