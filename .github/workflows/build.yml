name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Create Flutter scaffold
        run: flutter create --org com.dbneighbors --project-name app /tmp/dbapp

      - name: Inject our code
        run: cp lib/main.dart /tmp/dbapp/lib/main.dart

      - name: Build APK
        run: |
          cd /tmp/dbapp
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dB-Neighbors-v1.0-debug
          path: /tmp/dbapp/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
