name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Create fresh Flutter project
        run: |
          cd /tmp
          flutter create --org com.dbneighbors --project-name app fresh_app
          echo "Created fresh project"
          ls /tmp/fresh_app/

      - name: Replace lib with our code
        run: |
          cp -f lib/main.dart /tmp/fresh_app/lib/main.dart
          echo "Replaced main.dart"

      - name: Build APK
        run: |
          cd /tmp/fresh_app
          flutter pub get
          flutter build apk --debug
          ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-debug
          path: /tmp/fresh_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
