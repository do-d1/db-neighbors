name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Create fresh Flutter project
        run: |
          cd /tmp
          flutter create --org com.example --project-name dbneighbors fresh_app
          echo "Fresh project created"

      - name: Copy our lib files into fresh project
        run: |
          cp -r lib/. /tmp/fresh_app/lib/
          cp pubspec.yaml /tmp/fresh_app/pubspec.yaml

      - name: Build APK from fresh project
        run: |
          cd /tmp/fresh_app
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons
          echo "Build done"
          ls -la build/app/outputs/flutter-apk/ || echo "No output"

      - name: Copy APK back
        run: |
          mkdir -p build/app/outputs/flutter-apk/
          cp /tmp/fresh_app/build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ 2>/dev/null || echo "Copy failed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
