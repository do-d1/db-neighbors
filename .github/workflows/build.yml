name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons
        continue-on-error: true

      - name: Find APK
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -not -path "*/cache/*" 2>/dev/null
          echo "Build output structure:"
          ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload any APK found
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-any-apk
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 30
