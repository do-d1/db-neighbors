name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Flutter version check
        run: |
          flutter --version
          java -version
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Create and build minimal Flutter app
        run: |
          flutter create --org com.test --project-name myapp /tmp/myapp
          cd /tmp/myapp
          flutter build apk --debug 2>&1 | tail -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-debug
          path: /tmp/myapp/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
