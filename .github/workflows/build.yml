name: Build dB Neighbors APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK verbose
        run: flutter build apk --debug --no-tree-shake-icons --verbose
        continue-on-error: true

      - name: Check output
        run: |
          echo "=== APK output files ==="
          find build/ -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== build directory ==="
          ls -la build/ 2>/dev/null || echo "No build dir"
