name: Build dB Neighbors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create dummy firebase_options.dart
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'FIREBASE_EOF'
          import 'package:firebase_core/firebase_core.dart';
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => android;
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'placeholder',
              appId: '1:000000000000:android:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'db-neighbors-placeholder',
              storageBucket: 'db-neighbors-placeholder.appspot.com',
            );
          }
          FIREBASE_EOF

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK (debug)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
        continue-on-error: true

  build-ios:
    name: Build iOS (no sign)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create dummy firebase_options.dart
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'FIREBASE_EOF'
          import 'package:firebase_core/firebase_core.dart';
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => ios;
            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'placeholder',
              appId: '1:000000000000:ios:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'db-neighbors-placeholder',
              storageBucket: 'db-neighbors-placeholder.appspot.com',
              iosBundleId: 'com.example.dbNeighbors',
            );
          }
          FIREBASE_EOF

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug || true

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: db-neighbors-ios-nosign
          path: build/ios/iphoneos/Runner.app
          retention-days: 14
        continue-on-error: true
