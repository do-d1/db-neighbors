name: db_neighbors
description: Measure dB, BPM, speech speed — connect with neighbors
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio & measurement
  noise_meter: ^6.0.0
  permission_handler: ^11.3.0
  audio_session: ^0.1.21

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.0.3

  # Social / networking
  geolocator: ^13.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # UI
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Utilities
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
